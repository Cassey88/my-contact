<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#26221C">
<meta name="mobile-web-app-capable" content="yes">
<title>My Contact</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    background: #FBF8F2; color: #26221C;
    font-family: 'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
  header { padding: 18px 16px 12px; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
  .row { display: flex; justify-content: space-between; align-items: baseline; }
  .textbtn { background: none; border: none; color: #3D5A80; font-weight: 700; font-size: 14px; padding: 6px; font-family: inherit; }
  input, textarea {
    width: 100%; padding: 14px; font-size: 16px; border: 1.5px solid #E6DFD2;
    border-radius: 12px; background: #fff; color: #26221C; outline: none; font-family: inherit;
  }
  textarea { min-height: 88px; resize: vertical; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .chips.scroll { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }
  .chip { padding: 10px 16px; border-radius: 999px; border: 1.5px solid transparent; font-size: 15px; font-weight: 700; font-family: inherit; white-space: nowrap; }
  .card {
    width: 100%; display: flex; align-items: center; gap: 12px; background: #fff;
    border: 1.5px solid #EFE9DD; border-radius: 16px; padding: 12px 14px; margin-bottom: 10px;
    font-family: inherit; text-align: left;
  }
  .avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0; letter-spacing: 0.02em; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .tag { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; flex-shrink: 0; }
  .label { display: block; font-size: 13px; font-weight: 700; color: #8A8375; margin: 14px 2px 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .label .hint { font-weight: 500; text-transform: none; letter-spacing: 0; }
  .footer {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; padding: 12px 16px 20px;
    background: linear-gradient(transparent, #FBF8F2 30%); display: flex; gap: 10px;
  }
  .bigbtn {
    flex: 1; padding: 16px; border-radius: 14px; border: none; color: #fff;
    font-size: 17px; font-weight: 800; font-family: inherit;
  }
  .action {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    background: #fff; border: 1.5px solid #EFE9DD; border-radius: 14px;
    padding: 15px 16px; margin-bottom: 10px; text-decoration: none; font-size: 15px; color: #26221C;
  }
  .banner { margin: 0 16px 8px; padding: 12px 14px; background: #F7EDDB; color: #7A5A17; border-radius: 12px; font-size: 13px; line-height: 1.4; }
  #toast {
    position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
    background: #26221C; color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 600; z-index: 30; white-space: nowrap; display: none;
  }
  .overlay { position: fixed; inset: 0; background: rgba(38,34,28,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 20; }
  .sheet { background: #FBF8F2; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 24px 20px 28px; }
  .photo-wrap { position: relative; width: 76px; height: 76px; border-radius: 50%; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .photo-wrap input, .picklabel input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; font-size: 0; }
  .picklabel { position: relative; display: inline-block; }
  button { cursor: pointer; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<input type="file" id="importFile" accept=".csv,text/csv" style="display:none">
<input type="file" id="faceFile" accept="image/*" capture="environment" style="display:none">

<script>
"use strict";
// ---------------- Data ----------------
const GROUPS = [
  { name: "Church", color: "#6B4E9B", soft: "#ECE5F5" },
  { name: "Family", color: "#C2503B", soft: "#F8E4E0" },
  { name: "Contractor", color: "#3D5A80", soft: "#E2EAF2" },
  { name: "Tenant", color: "#3E7A5E", soft: "#E1EFE7" },
  { name: "Restaurant", color: "#B04A17", soft: "#F8E8DE" },
  { name: "Friend", color: "#B07A1E", soft: "#F7EDDB" },
];
const gOf = n => GROUPS.find(g => g.name === n) || { name: n, color: "#4E6151", soft: "#E4ECE6" };
const KEY = "my-contact:v1";

let canStore = true;
let people = [];
try {
  const raw = localStorage.getItem(KEY);
  if (raw) people = JSON.parse(raw);
} catch (e) { canStore = false; }

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(people)); }
  catch (e) {
    canStore = false;
    toast("Can't save here — open this file in Chrome to keep your data");
  }
}

// ---------------- State ----------------
let view = "list", filter = "All", search = "";
let form = null, editingId = null, selectedId = null, confirmDel = false;

const esc = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const initials = n => n.trim().split(/\s+/).slice(0,2).map(w => (w[0]||"").toUpperCase()).join("");
const fmtDate = iso => { try { return new Date(iso).toLocaleDateString("en-NZ",{day:"numeric",month:"short",year:"numeric"}); } catch(e){ return iso; } };
const emptyForm = () => ({ name:"", phone:"", email:"", address:"", group: filter !== "All" ? filter : "Church", photo:"", photoData:"", notes:"", yearsNZ:"", profession:"", status:"", children:"", wife:"", nationality:"" });
const STATUSES = ["PR", "Citizen", "Work Permit", "Visitor"];
const NATIONALITIES = ["Indonesian", "Korean", "Malaysian", "Singaporean"];

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 2200);
}

// ---------------- Photo resize ----------------
function pickPhoto(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 480, scale = Math.min(1, max / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      form.photoData = c.toDataURL("image/jpeg", 0.72);
      render();
    };
    img.onerror = () => toast("Couldn't read that photo — try another");
    img.src = reader.result;
  };
  reader.onerror = () => toast("Couldn't read that photo — try another");
  reader.readAsDataURL(file);
}

// ---------------- CSV export / import ----------------
function exportCSV() {
  const head = ["ID","Name","Phone","Email","Address","Group/Category","Years in NZ","Profession","Nationality","Status","Children","Wife","Notes","Date Added","Last Modified","PhotoData"];
  const q = v => '"' + String(v ?? "").replace(/"/g,'""') + '"';
  const rows = people.map(p => [p.id,p.name,p.phone,p.email,p.address,p.group,p.yearsNZ||"",p.profession||"",p.nationality||"",p.status||"",p.children||"",p.wife||"",p.notes,fmtDate(p.dateAdded),p.dateModified?fmtDate(p.dateModified):"",p.photoData||""].map(q).join(","));
  const blob = new Blob([[head.map(q).join(","),...rows].join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "My contact.csv";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("Saved as My contact.csv — share it to Google Drive");
}

function parseCSV(text) {
  const rows = []; let row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ",") { row.push(cell); cell = ""; }
    else if (ch === "\n" || ch === "\r") {
      if (ch === "\r" && text[i+1] === "\n") i++;
      row.push(cell); rows.push(row); row = []; cell = "";
    } else cell += ch;
  }
  if (cell !== "" || row.length) { row.push(cell); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ""));
}

function importCSV(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const rows = parseCSV(reader.result);
    if (rows.length < 2) { toast("That file looks empty"); return; }
    const head = rows[0].map(h => h.trim().toLowerCase());
    const col = name => head.findIndex(h => h.startsWith(name));
    const iName = col("name");
    if (iName < 0) { toast("Couldn't find a Name column"); return; }
    const iPhone = col("phone"), iEmail = col("email"), iAddr = col("address"),
          iGroup = col("group"), iPhoto = col("photo ("), iNotes = col("notes"), iPD = col("photodata"),
          iYears = col("years"), iProf = col("profession"), iStatus = col("status"),
          iChild = col("children"), iWife = col("wife"), iNat = col("nationality");
    let maxId = people.reduce((m,p) => Math.max(m,p.id), 0), added = 0;
    for (const r of rows.slice(1)) {
      const name = (r[iName]||"").trim();
      if (!name) continue;
      const dup = people.some(p => p.name.toLowerCase() === name.toLowerCase());
      if (dup) continue;
      people.push({
        id: ++maxId, name,
        phone: iPhone>=0 ? r[iPhone]||"" : "",
        email: iEmail>=0 ? r[iEmail]||"" : "",
        address: iAddr>=0 ? r[iAddr]||"" : "",
        group: iGroup>=0 && GROUPS.some(g=>g.name===(r[iGroup]||"").trim()) ? r[iGroup].trim() : "Church",
        photo: iPhoto>=0 && !/^\(photo/.test(r[iPhoto]||"") ? r[iPhoto]||"" : "",
        photoData: iPD>=0 ? r[iPD]||"" : "",
        yearsNZ: iYears>=0 ? r[iYears]||"" : "",
        profession: iProf>=0 ? r[iProf]||"" : "",
        status: iStatus>=0 ? r[iStatus]||"" : "",
        children: iChild>=0 ? r[iChild]||"" : "",
        wife: iWife>=0 ? r[iWife]||"" : "",
        nationality: iNat>=0 ? r[iNat]||"" : "",
        notes: iNotes>=0 ? r[iNotes]||"" : "",
        dateAdded: new Date().toISOString(),
      });
      added++;
    }
    save(); render();
    toast(added ? "Imported " + added + " people" : "No new people found (duplicates skipped)");
  };
  reader.readAsText(file);
}
document.getElementById("importFile").addEventListener("change", e => {
  if (e.target.files[0]) importCSV(e.target.files[0]);
  e.target.value = "";
});

// ---------------- Face search ----------------
let faceReady = null;
function loadFaceAPI() {
  if (faceReady) return faceReady;
  faceReady = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js";
    s.onload = async () => {
      try {
        const base = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
        await faceapi.nets.tinyFaceDetector.loadFromUri(base);
        await faceapi.nets.faceLandmark68Net.loadFromUri(base);
        await faceapi.nets.faceRecognitionNet.loadFromUri(base);
        resolve();
      } catch (e) { faceReady = null; reject(e); }
    };
    s.onerror = () => { faceReady = null; reject(new Error("load failed")); };
    document.head.appendChild(s);
  });
  return faceReady;
}

async function descriptorFromDataUrl(dataUrl) {
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = dataUrl; });
  const det = await faceapi
    .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks().withFaceDescriptor();
  return det ? Array.from(det.descriptor) : null;
}

const dist = (a, b) => Math.sqrt(a.reduce((s, v, i) => s + (v - b[i]) * (v - b[i]), 0));

async function faceSearch(file) {
  if (!file) return;
  const withPhotos = people.filter(p => p.photoData);
  if (!withPhotos.length) { toast("No saved photos to match against yet"); return; }
  toast("Loading face search…");
  try { await loadFaceAPI(); }
  catch (e) { toast("Needs internet the first time — check connection"); return; }

  const reader = new FileReader();
  reader.onload = async () => {
    try {
      toast("Looking at the face…");
      const qDesc = await descriptorFromDataUrl(reader.result);
      if (!qDesc) { toast("Couldn't see a face in that photo — try again closer"); return; }
      toast("Comparing with your people…");
      let best = null, bestD = Infinity;
      for (const p of withPhotos) {
        if (!p.faceDesc) {
          const d = await descriptorFromDataUrl(p.photoData);
          p.faceDesc = d || "none";
          save();
        }
        if (!Array.isArray(p.faceDesc)) continue;
        const d = dist(qDesc, p.faceDesc);
        if (d < bestD) { bestD = d; best = p; }
      }
      if (best && bestD < 0.55) {
        selectedId = best.id; view = "detail"; render();
        toast("Found: " + best.name);
      } else if (best && bestD < 0.68) {
        selectedId = best.id; view = "detail"; render();
        toast("Closest match (not certain): " + best.name);
      } else {
        toast("No match found among saved photos");
      }
    } catch (e) {
      toast("Face search hit a problem — try again");
    }
  };
  reader.readAsDataURL(file);
}
document.getElementById("faceFile").addEventListener("change", e => {
  if (e.target.files[0]) faceSearch(e.target.files[0]);
  e.target.value = "";
});

// ---------------- OCR (read details from an image) ----------------
let ocrReady = null;
function loadOCR() {
  if (ocrReady) return ocrReady;
  ocrReady = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload = () => resolve();
    s.onerror = () => { ocrReady = null; reject(new Error("load failed")); };
    document.head.appendChild(s);
  });
  return ocrReady;
}

const UI_WORDS = /\b(call|message|video|email|mobile|work|home|recent|activity|contact|contacts|edit|save|back|search|phone|sms|add|delete)\b/i;

function extractEmail(text) {
  const FINAL = /\.(com|net|org|edu|gov|mil|info|biz|io|me|nz|au|sg|my|id|kr|cn|hk|tw|jp|uk|us|ca)$/i;
  const m = text.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)*/);
  if (!m) return null;
  let email = m[0];
  // If it doesn't end in a real TLD yet, look ahead past OCR junk for ".com" / ".co" ".nz" fragments
  let rest = text.slice(m.index + m[0].length, m.index + m[0].length + 80);
  let guard = 0;
  while (!FINAL.test(email) && guard++ < 3) {
    const frag = rest.match(/\.\s*([A-Za-z]{2,10})\b/);
    if (!frag) break;
    email += "." + frag[1];
    rest = rest.slice(frag.index + frag[0].length);
  }
  return email;
}

function parseContactText(text) {
  const out = {};
  const email = extractEmail(text);
  if (email) out.email = email;

  // Phone — don't span line breaks; prefer numbers that look NZ (starting 0 or +64)
  const phones = (text.match(/(\+?\d[\d \t()-]{5,}\d)/g) || [])
    .map(s => s.trim())
    .filter(s => { const d = s.replace(/\D/g, ""); return d.length >= 7 && d.length <= 13; })
    .sort((a, b) => (/^(0|\+?64)/.test(b.replace(/\D/g, "")) ? 1 : 0) - (/^(0|\+?64)/.test(a.replace(/\D/g, "")) ? 1 : 0));
  if (phones.length) out.phone = phones[0].replace(/[()-]/g, " ").replace(/\s+/g, " ").trim();

  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const clean = s => s.replace(/[^\w\s,.'&/-]/g, "").replace(/\s+/g, " ").trim();

  // Name — clean icon junk around it; skip sentence-like lines ending in "."
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const cl = clean(raw).replace(/[._]+$/, "");
    if (!cl || UI_WORDS.test(cl) || /\d/.test(cl) || cl.endsWith(".")) continue;
    if (!/^[A-Za-z][A-Za-z' .&-]*$/.test(cl)) continue;
    let words = cl.split(/\s+/).filter(w => !/^[a-z]+[A-Z]/.test(w));
    if (cl !== raw) {
      // Line had icon junk — strip short scraps clinging to the edges
      while (words.length && words[0].length <= 2) words.shift();
      while (words.length && words[words.length - 1].length <= 2) words.pop();
    } else {
      words = words.filter(w => w.length > 1);
    }
    if (words.length >= 2 && words.length <= 4 && words.join(" ").length <= 40) {
      let name = words.join(" ");
      const nxt = lines[i + 1];
      if (nxt && /^[A-Za-z][A-Za-z' &-]*$/.test(nxt) && !UI_WORDS.test(nxt)
          && nxt.split(/\s+/).length <= 3 && (name + " " + nxt).length <= 45) {
        name += " " + nxt;
      }
      out.name = name;
      break;
    }
  }

  // Address — join continuation lines ("57D Wolverton Street," / "Avondale, Auckland 0600")
  const addrRe = /\b(street|st|road|rd|avenue|ave|drive|dr|place|pl|way|crescent|cres|lane|ln|terrace|tce|highway|hwy)\b/i;
  for (let i = 0; i < lines.length; i++) {
    if (/\d/.test(lines[i]) && addrRe.test(lines[i])) {
      let addr = clean(lines[i]);
      let j = i + 1;
      while (addr.endsWith(",") && j < lines.length) {
        const cont = clean(lines[j]);
        if (!cont || UI_WORDS.test(cont)) break;
        addr += " " + cont;
        j++;
      }
      out.address = addr.replace(/([a-z])(\d)/g, "$1 $2").replace(/,\s*$/, "");
      break;
    }
  }

  // Notes — take the line(s) after a "Notes" heading
  const ni = lines.findIndex(l => /^notes\b/i.test(l));
  if (ni >= 0) {
    const noteLines = [];
    for (let j = ni + 1; j < lines.length && noteLines.length < 3; j++) {
      const l = clean(lines[j]);
      if (!l || UI_WORDS.test(l)) break;
      noteLines.push(l);
    }
    if (noteLines.length) out.notes = noteLines.join(" ");
  }
  return out;
}

async function ocrScan(file, applyFn) {
  toast("Reading text from image… first time downloads the reader");
  try { await loadOCR(); }
  catch (e) { toast("Needs internet the first time — check connection"); return; }
  try {
    const worker = await Tesseract.createWorker("eng");
    const { data } = await worker.recognize(file);
    await worker.terminate();
    const found = parseContactText(data.text || "");
    if (!found.name && !found.phone && !found.email && !found.address && !found.notes) {
      toast("Couldn't find contact details in that image");
      return;
    }
    applyFn(found);
  } catch (e) {
    toast("Couldn't read that image — try a clearer one");
  }
}

// ---------------- Rendering ----------------
const app = document.getElementById("app");

function avatarHTML(p, size) {
  const g = gOf(p.group);
  const src = p.photoData || (/^https?:\/\//i.test(p.photo||"") ? p.photo : null);
  if (src) return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;border:2px solid '+g.color+'"><img src="'+esc(src)+'" alt=""></div>';
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+g.soft+';color:'+g.color+';font-size:'+Math.round(size*0.38)+'px">'+esc(initials(p.name)||"?")+'</div>';
}

function render() {
  confirmEl = null;
  if (view === "add") renderForm();
  else if (view === "detail") renderDetail();
  else renderList();
}

function renderList() {
  const q = search.trim().toLowerCase();
  const shown = people
    .filter(p => filter === "All" || p.group === filter)
    .filter(p => !q || [p.name,p.phone,p.email,p.address,p.notes,p.profession,p.wife,p.status,p.nationality].some(f => (f||"").toLowerCase().includes(q)))
    .sort((a,b) => a.name.localeCompare(b.name));
  const counts = { All: people.length };
  GROUPS.forEach(g => counts[g.name] = people.filter(p => p.group === g.name).length);

  let h = '<header>';
  h += '<div class="row"><h1>My Contact</h1><div>';
  h += '<button class="textbtn" id="btnImport">Import</button>';
  if (people.length) h += '<button class="textbtn" id="btnExport">Save to Drive (CSV)</button>';
  h += '</div></div>';
  if (!canStore) h += '<div class="banner" style="margin:8px 0 0">Saving is blocked in this viewer. Download this file and open it in Chrome — then everything you add is kept.</div>';
  h += '<div style="display:flex;gap:8px;margin-top:12px;align-items:stretch">'

  h += '<label class="label">Name</label><input id="f_name" placeholder="Full name" value="'+esc(form.name)+'">';
  h += '<label class="label">Group</label><div class="chips" id="groupChips">';
  GROUPS.forEach(gr => {

  h += '<label class="label">Years in NZ</label><input id="f_yearsNZ" inputmode="numeric" placeholder="e.g. 12" value="'+esc(form.yearsNZ)+'">';
  h += '<label class="label">Profession</label><input id="f_profession" placeholder="e.g. Nurse, Engineer" value="'+esc(form.profession)+'">';
  h += '<label class="label">Nationality <span class="hint">(pick or type your own)</span></label>'
    + '<input id="f_nationality" list="natList" placeholder="— Select or type —" value="'+esc(form.nationality)+'">'
    + '<datalist id="natList">';
  NATIONALITIES.forEach(n => { h += '<option value="'+n+'">'; });
  h += '</datalist>';
  h += '<label class="label">Status <span class="hint">(pick or type your own)</span></label>'
    + '<input id="f_status" list="statusList" placeholder="— Select or type —" value="'+esc(form.status)+'">'
    + '<datalist id="statusList">';
  STATUSES.forEach(st => { h += '<option value="'+st+'">'; });
  h += '</datalist>';
  h += '<label class="label">No. of children</label><input id="f_children" inputmode="numeric" placeholder="e.g. 2" value="'+esc(form.children)+'">';
  h += '<label class="label">Wife</label><input id="f_wife" placeholder="Name" value="'+esc(form.wife)+'">';
  h += '<label class="label">Notes</label><textarea id="f_notes" placeholder="Anything worth remembering">'+esc(form.notes)+'</textarea>';

  app.innerHTML = h;

  const grab = () => {
    form.name = document.getElementById("f_name").value;
    form.phone = document.getElementById("f_phone").value;
    form.email = document.getElementById("f_email").value;
    form.address = document.getElementById("f_address").value;
    form.yearsNZ = document.getElementById("f_yearsNZ").value;
    form.profession = document.getElementById("f_profession").value;
    form.nationality = document.getElementById("f_nationality").value;
    form.status = document.getElementById("f_status").value;
    form.children = document.getElementById("f_children").value;
    form.wife = document.getElementById("f_wife").value;
    form.notes = document.getElementById("f_notes").value;
  };
  document.getElementById("btnBack").addEventListener("click", () => {
    view = editingId ? "detail" : "list"; editingId = null; form = null; render();
  });
  document.getElementById("groupChips").addEventListener("click", e => {
    const b = e.target.closest("[data-g]"); if (!b) return;
    grab(); form.group = b.dataset.g; render();
  });
  ["photoPick","photoPick2","photoPick3"].forEach(id => {
    document.getElementById(id).addEventListener("change", e => {
      grab(); pickPhoto(e.target.files[0]); e.target.value = "";
    });
  });
  const rm = document.getElementById("photoRemove");
  if (rm) rm.addEventListener("click", () => { grab(); form.photoData = ""; form.photoRemoved = true; render(); });
  document.getElementById("ocrPick").addEventListener("change", e => {
    const file = e.target.files[0]; e.target.value = "";
    if (!file) return;
    grab();
    ocrScan(file, found => {
      const filled = [];
      if (found.name && !form.name.trim()) { form.name = found.name; filled.push("name"); }
      if (found.phone && !form.phone.trim()) { form.phone = found.phone; filled.push("phone"); }
      if (found.email && !form.email.trim()) { form.email = found.email; filled.push("email"); }
      if (found.address && !form.address.trim()) { form.address = found.address; filled.push("address"); }
      if (found.notes && !form.notes.trim()) { form.notes = found.notes; filled.push("notes"); }
      render();
      toast(filled.length ? "Filled in: " + filled.join(", ") + " — please check" : "Details found were already filled in");
    });
  });
  document.getElementById("btnSave").addEventListener("click", () => {
    grab();
    if (!form.name.trim()) { toast("Name is needed first"); return; }
    if (editingId) {
      const p = people.find(x => x.id === editingId);
      Object.assign(p, {
        name: form.name, phone: form.phone, email: form.email, address: form.address,
        group: form.group, notes: form.notes,
        yearsNZ: form.yearsNZ, profession: form.profession, status: form.status,
        children: form.children, wife: form.wife, nationality: form.nationality,
      });
      if (form.photoData) p.photoData = form.photoData;
      else if (form.photoRemoved) p.photoData = "";
      p.dateModified = new Date().toISOString();
      save(); toast("Saved changes"); view = "detail";
    } else {
      const id = people.reduce((m,p) => Math.max(m,p.id), 0) + 1;
      people.push({
        id, name: form.name, phone: form.phone, email: form.email, address: form.address,
        group: form.group, photo: "", photoData: form.photoData || "",
        yearsNZ: form.yearsNZ, profession: form.profession, status: form.status,
        children: form.children, wife: form.wife, nationality: form.nationality,
        notes: form.notes, dateAdded: new Date().toISOString(), dateModified: new Date().toISOString(),
      });
      save(); toast("Added " + form.name.trim()); view = "list";
    }
    editingId = null; form = null; render();
  });
}

let confirmEl = null;
function renderDetail() {
  const p = people.find(x => x.id === selectedId);
  if (!p) { view = "list"; render(); return; }
  const g = gOf(p.group);
  const tel = (p.phone||"").replace(/\s/g,"");
  let h = '<header style="display:flex;justify-content:space-between;align-items:center">'
    + '<button class="textbtn" id="btnBack" style="font-size:16px">‹ All people</button>'
    + '<button class="textbtn" id="btnDel" style="color:#B3402E;font-size:14px">Delete</button></header>';
  h += '<div style="text-align:center;padding:8px 20px 4px"><div style="display:inline-block">'+avatarHTML(p,88)+'</div>'
    + '<h2 style="margin:12px 0 4px;font-size:26px;font-weight:800">'+esc(p.name)+'</h2>'
    + '<span class="tag" style="background:'+g.soft+';color:'+g.color+'">'+p.group+'</span>'
    + '<div style="color:#8A8375;font-size:13px;margin-top:8px">Added '+fmtDate(p.dateAdded)+' · #'+p.id
    + (p.dateModified ? ' · Updated '+fmtDate(p.dateModified) : '') + '</div></div>';
  h += '<div style="padding:8px 16px 120px">';
  const dim = v => v ? '<span style="text-align:right">'+esc(v)+'</span>' : '<span style="color:#C9C2B4">—</span>';
  if (p.phone) {
    h += '<div class="action"><span style="font-weight:700;color:'+g.color+'">Phone</span>'
      + '<span style="display:flex;align-items:center;gap:8px">'
      + '<span style="color:#26221C;font-weight:600">'+esc(p.phone)+'</span>'
      + '<button id="btnCall" class="tag" style="background:'+g.soft+';border:none;padding:8px 14px;font-size:16px;font-family:inherit">📞</button>'
      + '<button id="btnSms" class="tag" style="background:'+g.soft+';color:'+g.color+';border:none;padding:8px 14px;font-size:14px;font-family:inherit">SMS</button>'
      + '</span></div>';
  } else {
    h += '<div class="action"><span style="font-weight:700;color:#8A8375">Phone</span>'+dim("")+'</div>';
  }
  if (p.email) h += '<a class="action" href="mailto:'+esc(p.email)+'"><span style="font-weight:700;color:'+g.color+'">Email</span><span>'+esc(p.email)+'</span></a>';
  else h += '<div class="action"><span style="font-weight:700;color:#8A8375">Email</span>'+dim("")+'</div>';
  if (p.address) {
    h += '<a class="action" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.address)+'" target="_blank" style="text-decoration:none">'
      + '<span style="font-weight:700;color:'+g.color+'">Address</span>'
      + '<span style="text-align:right;color:#26221C">'+esc(p.address)+' 📍</span></a>';
  } else {
    h += '<div class="action"><span style="font-weight:700;color:#8A8375">Address</span>'+dim("")+'</div>';
  }
  h += '<div class="action"><span style="font-weight:700;color:#8A8375">Wife</span>'
    + (p.wife
      ? '<span style="display:flex;align-items:center;gap:10px"><span>'+esc(p.wife)+'</span>'
        + '<button id="btnSwap" class="tag" style="background:'+g.color+';color:#fff;border:none;padding:8px 14px;font-size:14px;font-family:inherit">⇄ Switch</button></span>'
      : dim(""))
    + '</div>';
  h += '<div class="action"><span style="font-weight:700;color:#8A8375">Children</span>'+dim(p.children)+'</div>';
  h += '<div class="action"><span style="font-weight:700;color:#8A8375">Profession</span>'+dim(p.profession)+'</div>';
  h += '<div class="action"><span style="font-weight:700;color:#8A8375">Nationality</span>'+dim(p.nationality)+'</div>';
  h += '<div class="action"><span style="font-weight:700;color:#8A8375">Years in NZ</span>'+dim(p.yearsNZ)+'</div>';
  h += '<div class="action"><span style="font-weight:700;color:#8A8375">Status</span>'+dim(p.status)+'</div>';
  h += '<div class="action" style="flex-direction:column;align-items:flex-start;gap:6px"><span style="font-weight:700;color:#8A8375">Notes</span>'
    + (p.notes ? '<span style="white-space:pre-wrap">'+esc(p.notes)+'</span>' : '<span style="color:#C9C2B4">—</span>') + '</div>';
  h += '</div><div class="footer">'
    + '<button class="bigbtn" id="btnEdit" style="background:'+g.color+';flex:2">Edit</button>'
    + '<button class="bigbtn" id="btnBack2" style="background:#F0EBE1;color:#26221C;flex:1">Back</button></div>';
  app.innerHTML = h;

  document.getElementById("btnBack").addEventListener("click", () => { view = "list"; selectedId = null; render(); });
  document.getElementById("btnBack2").addEventListener("click", () => { view = "list"; selectedId = null; render(); });
  const sw = document.getElementById("btnSwap");
  if (sw) sw.addEventListener("click", () => {
    const t = p.name; p.name = p.wife; p.wife = t;
    p.dateModified = new Date().toISOString();
    save(); render(); toast("Switched to " + p.name);
  });
  const call = document.getElementById("btnCall");
  if (call) call.addEventListener("click", () => { window.location.href = "tel:" + tel; });
  const sms = document.getElementById("btnSms");
  if (sms) sms.addEventListener("click", () => { window.location.href = "sms:" + tel; });
  document.getElementById("btnEdit").addEventListener("click", () => {
    form = { name:p.name, phone:p.phone, email:p.email, address:p.address, group:p.group, photo:p.photo||"", notes:p.notes, photoData:"",
             yearsNZ:p.yearsNZ||"", profession:p.profession||"", status:p.status||"", children:p.children||"", wife:p.wife||"", nationality:p.nationality||"" };
    editingId = p.id; view = "add"; render();
  });
  document.getElementById("btnDel").addEventListener("click", () => {
    const ov = document.createElement("div");
    ov.className = "overlay";
    ov.innerHTML = '<div class="sheet"><p style="margin:0 0 16px;font-weight:700;font-size:17px">Remove '+esc(p.name)+'?</p>'
      + '<button class="bigbtn" id="yesDel" style="background:#B3402E;width:100%;margin-bottom:10px">Yes, remove</button>'
      + '<button class="bigbtn" id="noDel" style="background:#F0EBE1;color:#26221C;width:100%">Keep</button></div>';
    document.body.appendChild(ov);
    ov.addEventListener("click", e => { if (e.target === ov) ov.remove(); });
    ov.querySelector("#yesDel").addEventListener("click", () => {
      people = people.filter(x => x.id !== p.id);
      save(); ov.remove(); selectedId = null; view = "list"; render(); toast("Person removed");
    });
    ov.querySelector("#noDel").addEventListener("click", () => ov.remove());
  });
}

render();
</script>
</body>
</html>
